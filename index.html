<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Information Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        transition: background-color 0.5s;
    }

    .container {
        width: 400px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input {
        width: 90%;
        padding: 8px;
        margin-top: 5px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        background-color: #007BFF;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    #datetime {
        margin-top: 20px;
        font-weight: bold;
    }

    .profile-card {
        margin-top: 25px;
        padding: 15px;
        border: 2px solid #333;
        border-radius: 10px;
        display: none;
        background-color: #fafafa;
    }

    .profile-card h3 {
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Student Information Form</h2>

    <form id="studentForm">
        <label>Name:</label>
        <input type="text" id="name" required>

        <label>Age:</label>
        <input type="number" id="age" required>

        <label>Grade Level:</label>
        <input type="number" id="grade" required>

        <label>Section:</label>
        <input type="text" id="section" required>

        <button type="submit">Submit</button>
    </form>

    <div id="datetime"></div>

    <div class="profile-card" id="profileCard">
        <h3>Student Profile Card</h3>
        <p><strong>Name:</strong> <span id="cardName"></span></p>
        <p><strong>Age:</strong> <span id="cardAge"></span></p>
        <p><strong>Grade:</strong> <span id="cardGrade"></span></p>
        <p><strong>Section:</strong> <span id="cardSection"></span></p>
    </div>
</div>

<script>
    // Display current date and time
    function updateDateTime() {
        const now = new Date();
        document.getElementById("datetime").innerHTML =
            "<h4>Current Date and Time</h4>" +
            now.toLocaleString();
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    // Form submission
    document.getElementById("studentForm").addEventListener("submit", function(event) {
        event.preventDefault();

        // Get values
        const name = document.getElementById("name").value;
        const age = document.getElementById("age").value;
        const grade = document.getElementById("grade").value;
        const section = document.getElementById("section").value;

        // Change background color
        const colors = ["#d4edda", "#d1ecf1", "#fff3cd", "#f8d7da", "#e2e3e5"];
        document.body.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];

        // Display profile card
        document.getElementById("cardName").textContent = name;
        document.getElementById("cardAge").textContent = age;
        document.getElementById("cardGrade").textContent = grade;
        document.getElementById("cardSection").textContent = section;

        document.getElementById("profileCard").style.display = "block";
    });
</script>

</body>
</html>
